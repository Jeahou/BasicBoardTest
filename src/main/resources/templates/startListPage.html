<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Posts List</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">

    <div class="d-flex justify-content-end mt-3">
        <div th:if="${userNickName == null}">
            <a href="/oauth2/authorization/google?prompt=select_account" class="btn btn-outline-primary mr-2">
                로그인
            </a>
        </div>

        <div th:if="${userNickName != null}">
        <span class="mr-2">
            <strong th:text="${userNickName}"></strong> 님
        </span>
            <a href="/logout" class="btn btn-outline-danger">
                로그아웃
            </a>
        </div>
    </div>

    <h1 class="mt-4 mb-3">Posts</h1>

    <div sec:authorize="isAnonymous()">
        <a href="javascript:void(0);"
           onclick="if(confirm('로그인이 필요한 서비스입니다. 로그인 하시겠습니까?')) { location.href='/oauth2/authorization/google'; } return false;"
           class="btn btn-primary mb-3">
            글쓰기
        </a>
        <p class="text-muted mb-3">
            ✋ 로그인 후 글을 작성할 수 있습니다.
        </p>
    </div>

    <div sec:authorize="isAuthenticated()">
        <a href="/new" class="btn btn-primary mb-3">
            글쓰기
        </a>
    </div>

    <div class="list-group">
        <a th:each="post : ${posts}"
           th:href="@{/posts/{id}(id=${post.id})}"
           class="list-group-item list-group-item-action">
            <h5 class="mb-1" th:text="${post.title}">Post Title</h5>
            <!-- <p class="mb-1 text-truncate" th:text="${post.content}">Post Content</p> -->
            <small th:text="${post.author.nickName}">Post Author</small>
        </a>
    </div>
    <div th:if="${!posts.isEmpty()}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${!posts.hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=${posts.number - 1}|}">
                    <span>&laquo;</span>
                </a>
            </li>

            <li th:each="page: ${#numbers.sequence(0, posts.totalPages - 1)}"
                th:if="${page >= posts.number - 2 and page <= posts.number + 2}"
                th:classappend="${page == posts.number} ? 'active'"
                class="page-item">
                <a th:text="${page + 1}" class="page-link" th:href="@{|?page=${page}|}"></a>
            </li>

            <li class="page-item" th:classappend="${!posts.hasNext} ? 'disabled'">
                <a class="page-link" th:href="@{|?page=${posts.number + 1}|}">
                    <span>&raquo;</span>
                </a>
            </li>
        </ul>
    </div>
    <div class="row mt-3 justify-content-center">
        <div class="col-md-6">
            <form th:action="@{/posts/search}" method="GET" class="input-group">
                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="제목을 검색해보세요!">
                <button class="btn btn-primary" type="submit">검색</button>
            </form>
        </div>
    </div>

</div>
</body>
</html>
