<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit Post</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <script>
    async function updatePost(event) {
      event.preventDefault();
      const id = document.getElementById('id').value;
      const title = document.getElementById('title').value;
      const content = document.getElementById('content').value;

      const response = await fetch(`/api/v1/posts/${id}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ title, content})
      });

      if (response.ok) {
        window.location.href = `/posts/${id}`;
      }else if (response.status === 403) {
        alert("수정 권한이 없습니다. 로그인이 필요합니다.");
        window.location.href = "/"; // 메인으로 쫓아내기
      } else {
        alert("서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
      }
    }
  </script>
</head>
<body>
<div class="container">
  <div th:if="${userNickName != null}">
   <h1 class="mt-5 mb-3">Edit Post</h1>
   <form onsubmit="updatePost(event)">
     <input type="hidden" id="id" th:value="${post.id}" />
     <div class="form-group">
       <label for="title">Title:</label>
       <input type="text" id="title" class="form-control" th:value="${post.title}" required />
     </div>
     <div class="form-group">
       <label for="content">Content:</label>
       <textarea id="content" class="form-control" rows="5" required th:text="${post.content}"></textarea>
    </div>
    <div class="form-group">
      <label for="author">Author:</label>
      <input type="text" id="author" class="form-control" th:value="${post.author.nickName}" readonly  />
        <input type="hidden" id="authorId" th:value="${post.author.id}"/>
    </div>
    <div class="form-group">
      <button type="submit" class="btn btn-success">Update</button>
      <a href="/" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
  </div>
  <div th:unless="${userNickName != null}" class="mt-5">
    <div class="alert alert-danger">
      <h4>권한이 없습니다.</h4>
      <p>수정 권한이 있는 사용자만 접근할 수 있습니다. 로그인을 해주세요.</p>
      <a href="/" class="btn btn-primary">홈으로 가기</a>
    </div>
  </div>
</div>
</body>
</html>
