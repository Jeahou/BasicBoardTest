<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f5f5f5; margin: 0; font-family: sans-serif;">

    <div style="width: 100%; max-width: 380px; padding: 40px; background-color: #ffffff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;">

        <h2 style="margin-bottom: 10px; color: #333;">로그인</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 30px;">계속하려면 아이디와 비밀번호를 입력하세요.</p>

        <form>
            <input type="text" placeholder="아이디"
                   style="width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none;">

            <input type="password" placeholder="비밀번호"
                   style="width: 100%; padding: 12px 15px; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none;">

            <button type="submit"
                    style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">
                로그인
            </button>
        </form>

        <div style="margin-top: 20px; font-size: 13px; color: #888;">
            <a href="#" style="color: #007bff; text-decoration: none;">회원가입</a> |
            <a href="#" style="color: #007bff; text-decoration: none;">비밀번호 찾기</a>
        </div>

    </div>
</div>
</body>
</html>
